<!DOCTYPE html>
<html>
<head>
    <title>Color Picker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="color-picker-container" id="colorPickerContainer">
        <h1 class="color-picker-heading">Color Picker</h1>

        <div>
            <button class="button button-1">#e0e0e0</button>
            <button class="button button-2">#6fcf97</button>
            <button class="button button-3">#56ccf2</button>
            <button class="button button-4">#bb6bd9</button>
        </div>

        <p>
            Background Color :
            <span id="selectedColorHexCode">#ffffff</span>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
